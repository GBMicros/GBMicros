name: Build and Sign Nextcloud Client
on:
  push:
    branches: [ master ]
  workflow_dispatch:

jobs:
  build-macos:
    runs-on: macos-15-intel
    steps:
      - name: Checkout Code
        uses: actions/checkout@v5
        with:
          submodules: recursive

      - name: Import Apple Certificates
        uses: apple-actions/import-codesign-certs@v3
        with:
          p12-file-base64: ${{ secrets.MACOS_P12_BASE64 }}
          p12-password: ${{ secrets.P12_PASSWORD }}

      - name: Set Signing Identities
        run: |        
          /usr/bin/security find-identity -v signing_temp.keychain
          
          # This pulls the names from the keychain automatically
          APP_NAME=$(/usr/bin/security find-identity -v signing_temp.keychain | grep "Developer ID Application" | sed -E 's/.*"(.*)".*/\1/' | head -n 1)
          INST_NAME=$(/usr/bin/security find-identity -v signing_temp.keychain | grep "Developer ID Installer" | sed -E 's/.*"(.*)".*/\1/' | head -n 1)
          
          echo "APP_NAME: $APP_NAME"
          echo "INST_NAME: $INST_NAME"
          
          if [ -z "$APP_NAME" ]; then echo "❌ APP ID NOT FOUND"; exit 1; fi
          if [ -z "$INST_NAME" ]; then echo "❌ INSTALLER ID NOT FOUND"; exit 1; fi
          
          echo "SIGNING_IDENTITY_APP=$APP_NAME" >> $GITHUB_ENV
          echo "SIGNING_IDENTITY_INST=$INST_NAME" >> $GITHUB_ENV

      - name: Install Dependencies
        run: |
          brew update
          
          brew tap homebrew/cask
          brew install --cask inkscape
          
          brew install extra-cmake-modules qt@6 qtkeychain karchive libp11 ki18n
          
          brew tap KDAB/tap
          brew install kdsingleapplication-qt6
          
          brew tap kde-mac/kde https://invent.kde.org/packaging/homebrew-kde.git
          "$(brew --repo kde-mac/kde)/tools/do-caveats.sh"
          brew install kde-mac/kde/kf5-kguiaddons kde-mac/kde/kf5-kcoreaddons
          
          echo "QT_PATH=$(brew --prefix qt@6)/bin" >> $GITHUB_ENV

      - name: Compile Nextcloud Client
        run: |
          mkdir build && cd build
          cmake .. \
            -G Xcode \
            -DCMAKE_BUILD_TYPE=Release \
            -DCMAKE_OSX_DEPLOYMENT_TARGET=11.0 \
            -DAPPLICATION_NAME="gbmicros" \
            -DAPPLICATION_REV_DOMAIN="uk.co.gbmicros.storage" \
            -DMACOS_TEAM_ID="XG7B22RY35" \
            -DBUILD_FILE_PROVIDER_MODULE=ON \
            -DBUILD_TESTING=OFF \
            -DQt6_DIR="$(brew --prefix qt@6)/lib/cmake/Qt6" \
            -DCMAKE_OSX_ARCHITECTURES="x86_64;arm64" \
            -DCMAKE_XCODE_ATTRIBUTE_ARCHS="x86_64 arm64" \
            -DCMAKE_XCODE_ATTRIBUTE_VALID_ARCHS="x86_64 arm64" \
            -DCMAKE_PREFIX_PATH="$(brew --prefix qt@6);$(brew --prefix extra-cmake-modules)"
            
          XCODE_PROJ_PATH=$(find . -name "*.xcodeproj")
          
          xcodebuild -project $XCODE_PROJ_PATH \
           -scheme gbmicros \
           -configuration Release \
           -arch x86_64 -arch arm64 \
           build

      - name: Code Sign and Notarize
        env:
          KEY_ID: ${{ secrets.NOTARY_KEY_ID }}
          ISSUER_ID: ${{ secrets.NOTARY_ISSUER_ID }}
          NOTARY_P8: ${{ secrets.NOTARY_P8 }}
        run: |
          APP_PATH=$(find build/bin -name "*.app" -maxdepth 1 | head -n 1)
          ENTITLEMENTS="build/admin/osx/macosx.entitlements"

          # Search from the workspace root to find where these files actually are
          echo "Searching for extensions..."
          find . -name "*.appex"

          # 1. Discover paths dynamically from the build folder
          FINDER_SYNC_PATH=$(find build/shell_integration -name "FinderSyncExt.appex" | head -n 1)
          FILE_PROV_PATH=$(find build/fileprovider -name "FileProviderExt.appex" | head -n 1)

          # 2. Sign FinderSync if found
          if [ -n "$FINDER_SYNC_PATH" ]; then
            echo "Signing FinderSync at $FINDER_SYNC_PATH"
            codesign --force --options runtime --timestamp \
              --entitlements "shell_integration/MacOSX/FinderSyncExt.entitlements" \
              --sign "$SIGNING_IDENTITY_APP" "$FINDER_SYNC_PATH"
          else
            echo "❌ Error: FileProviderExt.appex not found";
            exit 1;
          fi

          # 3. Sign FileProvider if found
          if [ -n "$FILE_PROV_PATH" ]; then
            echo "Signing FileProvider at $FILE_PROV_PATH"
            codesign --force --options runtime --timestamp \
              --entitlements "shell_integration/MacOSX/FileProviderExt.entitlements" \
              --sign "$SIGNING_IDENTITY_APP" "$FILE_PROV_PATH"
          else
            echo "❌ Error: FileProviderExt.appex not found";
            exit 1;
          fi

          # 4. Sign the Main Binary
          codesign --force --options runtime --timestamp \
            --entitlements "build/admin/osx/macosx.entitlements" \
            --sign "$SIGNING_IDENTITY_APP" "build/bin/gbmicros.app/Contents/MacOS/gbmicros"

          # 5. Sign the Bundle
          codesign --force --options runtime --timestamp \
            --entitlements "build/admin/osx/macosx.entitlements" \
            --sign "$SIGNING_IDENTITY_APP" "build/bin/gbmicros.app"

          # 5. Package and Notarize
          productbuild --component "$APP_PATH" /Applications \
            --keychain signing_temp.keychain \
            --sign "$SIGNING_IDENTITY_INST" Nextcloud-Custom.pkg

          echo "$NOTARY_P8" > notary.p8
          xcrun notarytool submit Nextcloud-Custom.pkg --key-id "$KEY_ID" --issuer "$ISSUER_ID" --key notary.p8 --wait

      - name: Upload Finished Client
        uses: actions/upload-artifact@v4
        with:
          name: Nextcloud-macOS-Signed
          path: Nextcloud-Custom.pkg
