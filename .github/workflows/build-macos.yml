name: Build and Sign Nextcloud Client
on:
  push:
    branches: [ master ]
  workflow_dispatch:

jobs:
  build-macos:
    runs-on: macos-15-intel
    steps:
      - name: Checkout Code
        uses: actions/checkout@v5
        with:
          submodules: recursive

      - name: Import and Verify Certificates
        env:
          APP_P12: ${{ secrets.MACOS_APP_P12 }}
          INST_P12: ${{ secrets.MACOS_INSTALLER_P12 }}
          P12_PWD: ${{ secrets.P12_PASSWORD }}
        run: |
            KEYCHAIN_PATH=$RUNNER_TEMP/app-signing.keychain-db
            security create-keychain -p "$P12_PWD" $KEYCHAIN_PATH
            security set-keychain-settings -lut 21600 $KEYCHAIN_PATH
            security unlock-keychain -p "$P12_PWD" $KEYCHAIN_PATH
            security default-keychain -s $KEYCHAIN_PATH

            # 1. Import Intermediates (Crucial for validity)
            curl -LO https://www.apple.com/certificateauthority/DeveloperIDCA.cer
            curl -LO https://www.apple.com/certificateauthority/DeveloperIDG2CA.cer
            security import DeveloperIDCA.cer -k $KEYCHAIN_PATH -t cert
            security import DeveloperIDG2CA.cer -k $KEYCHAIN_PATH -t cert
            
            security add-trusted-cert -d -r trustRoot -k $KEYCHAIN_PATH AppleDeveloperIDCA.cer
            security add-trusted-cert -d -r trustRoot -k $KEYCHAIN_PATH AppleDeveloperIDG2CA.cer
            
            security default-keychain -s $KEYCHAIN_PATH
  
            # 2. Import P12s
            echo -n "$APP_P12" | base64 --decode > cert_app.p12
            echo -n "$INST_P12" | base64 --decode > cert_inst.p12
            security import cert_app.p12 -k $KEYCHAIN_PATH -P "$P12_PWD" -A -f pkcs12
            security import cert_inst.p12 -k $KEYCHAIN_PATH -P "$P12_PWD" -A -f pkcs12
  
            # 3. macOS 15 Permissions Fix
            security set-key-partition-list -S apple-tool:,apple:,codesign:,productbuild: -s -k "$P12_PWD" $KEYCHAIN_PATH

            # 4. Extract Names
            APP_NAME=$(security find-identity -v -p codesigning $KEYCHAIN_PATH | grep "Developer ID Application" | awk -F '"' '{print $2}')
            INST_NAME=$(security find-identity -v -p codesigning $KEYCHAIN_PATH | grep "Developer ID Installer" | awk -F '"' '{print $2}')

            echo "APP_NAME: $APP_NAME"
            echo "INST_NAME: $INST_NAME"

            if [ -z "$APP_NAME" ]; then echo "APP ID NOT FOUND"; exit 1; fi
            if [ -z "$INST_NAME" ]; then echo "INSTALLER ID NOT FOUND"; exit 1; fi

            echo "SIGNING_IDENTITY_APP=$APP_NAME" >> $GITHUB_ENV
            echo "SIGNING_IDENTITY_INST=$INST_NAME" >> $GITHUB_ENV
            echo "KEYCHAIN_PATH=$KEYCHAIN_PATH" >> $GITHUB_ENV

      - name: Install Dependencies
        run: |
          brew update
          
          brew tap homebrew/cask
          brew install --cask inkscape
          
          brew install extra-cmake-modules qt@6 qtkeychain karchive libp11 ki18n
          
          brew tap KDAB/tap
          brew install kdsingleapplication-qt6
          
          brew tap kde-mac/kde https://invent.kde.org/packaging/homebrew-kde.git
          "$(brew --repo kde-mac/kde)/tools/do-caveats.sh"
          brew install kde-mac/kde/kf5-kguiaddons kde-mac/kde/kf5-kcoreaddons
          
          echo "QT_PATH=$(brew --prefix qt@6)/bin" >> $GITHUB_ENV

      - name: Compile Nextcloud Client
        run: |
          rm -rf build && mkdir build && cd build
          cmake .. \
            -DAPPLICATION_NAME="GBMicros" \
            -DMACOSX_BUNDLE_BUNDLE_NAME="GBMicros" \
            -DAPPLICATION_REV_DOMAIN="uk.co.gbmicros" \
            -DAPPLICATION_ID="storage" \
            -DMACOS_TEAM_ID="XG7B22RY35" \
            -DMACOS_APP_GROUP_ID="group.uk.co.gbmicros.storage" \
            -DBUILD_VFS_FILEPROVIDER=ON \
            -DKDSingleApplication-qt6_DIR="$(brew --prefix kdsingleapplication-qt6)/lib/cmake/KDSingleApplication-qt6" \
            -DQt6_DIR="$(brew --prefix qt@6)/lib/cmake/Qt6" \
            -DCMAKE_PREFIX_PATH="$(brew --prefix qt@6);$(brew --prefix extra-cmake-modules)" \
            -DBUILD_TESTING=OFF \
            -DCMAKE_BUILD_TYPE=Release
          make -j$(sysctl -n hw.ncpu)

      - name: Code Sign and Notarize
        env:
          KEY_ID: ${{ secrets.NOTARY_KEY_ID }}
          ISSUER_ID: ${{ secrets.NOTARY_ISSUER_ID }}
        run: |
          APP_PATH=$(find build/bin -name "*.app" -maxdepth 1 | head -n 1)
          echo "Signing: $APP_PATH"

          # 1. Sign App (Always needs --timestamp for notarization)
          codesign --deep --force --options runtime --timestamp \
            --keychain "$KEYCHAIN_PATH" \
            --sign "$SIGNING_IDENTITY_APP" "$APP_PATH"
          
          # 2. Package into a .pkg
          # IMPORTANT: We use --keychain here to ensure productbuild looks in the right place
          productbuild --component "$APP_PATH" /Applications \
            --keychain "$KEYCHAIN_PATH" \
            --sign "$SIGNING_IDENTITY_INST" Nextcloud-Custom.pkg
          
          # 3. Notarize
          echo "${{ secrets.NOTARY_P8 }}" | base64 --decode > notary.p8
          xcrun notarytool submit Nextcloud-Custom.pkg --key-id "$KEY_ID" --issuer "$ISSUER_ID" --key notary.p8 --wait
          
          # 4. Staple
          xcrun stapler staple Nextcloud-Custom.pkg

      - name: Upload Finished Client
        uses: actions/upload-artifact@v4
        with:
          name: Nextcloud-macOS-Signed
          path: Nextcloud-Custom.pkg
