name: Build and Sign Nextcloud Client
on:
  push:
    branches: [ master ]
  workflow_dispatch:

jobs:
  build-macos:
    runs-on: macos-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v5
        with:
          submodules: recursive

      - name: Import Apple Certificates
        uses: apple-actions/import-codesign-certs@v3
        with:
          p12-file-base64: ${{ secrets.MACOS_P12_BASE64 }}
          p12-password: ${{ secrets.P12_PASSWORD }}

      - name: Set Signing Identities
        run: |        
          /usr/bin/security find-identity -v signing_temp.keychain
          
          # This pulls the names from the keychain automatically
          APP_NAME=$(/usr/bin/security find-identity -v signing_temp.keychain | grep "Developer ID Application" | sed -E 's/.*"(.*)".*/\1/' | head -n 1)
          INST_NAME=$(/usr/bin/security find-identity -v signing_temp.keychain | grep "Developer ID Installer" | sed -E 's/.*"(.*)".*/\1/' | head -n 1)
          
          echo "APP_NAME: $APP_NAME"
          echo "INST_NAME: $INST_NAME"
          
          if [ -z "$APP_NAME" ]; then echo "❌ APP ID NOT FOUND"; exit 1; fi
          if [ -z "$INST_NAME" ]; then echo "❌ INSTALLER ID NOT FOUND"; exit 1; fi
          
          echo "SIGNING_IDENTITY_APP=$APP_NAME" >> $GITHUB_ENV
          echo "SIGNING_IDENTITY_INST=$INST_NAME" >> $GITHUB_ENV

      - name: Install Dependencies
        run: |
          brew update
          
          brew tap homebrew/cask
          brew install --cask inkscape
          
          brew install extra-cmake-modules qt@6 qtkeychain karchive libp11 ki18n
          
          brew tap KDAB/tap
          brew install kdsingleapplication-qt6
          
          brew tap kde-mac/kde https://invent.kde.org/packaging/homebrew-kde.git
          "$(brew --repo kde-mac/kde)/tools/do-caveats.sh"
          brew install kde-mac/kde/kf5-kguiaddons kde-mac/kde/kf5-kcoreaddons
          
          echo "QT_PATH=$(brew --prefix qt@6)/bin" >> $GITHUB_ENV

      - name: Compile Nextcloud Client
        run: |
          mkdir build && cd build
          mkdir bin
          cmake .. \
            -G Xcode \
            -DCMAKE_BUILD_TYPE=Release \
            -DCMAKE_OSX_DEPLOYMENT_TARGET=11.0 \
            -DAPPLICATION_NAME="gbmicros" \
            -DAPPLICATION_REV_DOMAIN="uk.co.gbmicros.storage" \
            -DMACOS_TEAM_ID="XG7B22RY35" \
            -DBUILD_FILE_PROVIDER_MODULE=ON \
            -DBUILD_TESTING=OFF \
            -DCMAKE_PREFIX_PATH="$(brew --prefix qt@6);$(brew --prefix extra-cmake-modules)" \
            -DCMAKE_INSTALL_PREFIX=$GITHUB_WORKSPACE/deploy_root \
            -DCMAKE_OSX_ARCHITECTURES="arm64" \
            -DCMAKE_LIBRARY_OUTPUT_DIRECTORY=$GITHUB_WORKSPACE/build/bin \
            -DCMAKE_RUNTIME_OUTPUT_DIRECTORY=$GITHUB_WORKSPACE/build/bin

          xcodebuild -project client.xcodeproj \
            -scheme nextcloud \
            -configuration Release \
            -arch arm64 \
            ONLY_ACTIVE_ARCH=YES \
            CODE_SIGNING_ALLOWED=NO \
            build

          #mkdir -p $GITHUB_WORKSPACE/deploy_root/Applications/gbmicros.app/Contents/Resources/i18n
          
          #cp -R bin/Release/gbmicros.app $GITHUB_WORKSPACE/deploy_root/Applications/
          
          find .. -name "*vfs_suffix.dylib" -ls
          
          cmake --install . --config Release
          
          #mkdir -p $GITHUB_WORKSPACE/deploy_root/Applications/gbmicros.app/Contents/Resources/i18n
          #cp $GITHUB_WORKSPACE/deploy_root/share/gbmicros/i18n/*.qm $GITHUB_WORKSPACE/deploy_root/Applications/gbmicros.app/Contents/Resources/i18n/ || echo "No translations found"

      - name: Bundle and Code Sign
        env:
          SIGNING_IDENTITY_APP: ${{ env.SIGNING_IDENTITY_APP }}
          SIGNING_IDENTITY_INST: ${{ env.SIGNING_IDENTITY_INST }}
        run: |
          APP_PATH="$GITHUB_WORKSPACE/deploy_root/Applications/gbmicros.app"
          
          $(brew --prefix qt@6)/bin/macdeployqt "$APP_PATH" \
            -codesign="$SIGNING_IDENTITY_APP" \
            -hardened-runtime \
            -timestamp
          
          echo $(find "$APP_PATH/Contents/PlugIns" -name "*.appex")
          
          find "$APP_PATH/Contents/PlugIns" -name "*.appex" | while read extension; do
            echo "Signing extension: $extension"
            codesign --force --options runtime --timestamp \
              --sign "$SIGNING_IDENTITY_APP" \
              --entitlements "shell_integration/MacOSX/FinderSyncExt.entitlements" \
              "$extension"
          done
          
          echo $(find .. -name "*.entitlements")
          
          codesign --force --options runtime --timestamp \
            --sign "$SIGNING_IDENTITY_APP" \
            --entitlements "./admin/osx/macosx.entitlements" \
            "$APP_PATH"

      - name: Package and Notarize
        env:
          KEY_ID: ${{ secrets.NOTARY_KEY_ID }}
          ISSUER_ID: ${{ secrets.NOTARY_ISSUER_ID }}
          NOTARY_P8: ${{ secrets.NOTARY_P8 }}
          SIGNING_IDENTITY_INST: "Developer ID Installer: GARY WAYNE BENTLEY (XG7B22RY35)"
        run: |
          APP_PATH="$GITHUB_WORKSPACE/deploy_root/gbmicros.app"
          
          # 5. Build the PKG installer
          productbuild --component "$APP_PATH" /Applications \
            --sign "$SIGNING_IDENTITY_INST" \
            gbmicros-installer.pkg

          # 6. Submit for Notarization
          echo "$NOTARY_P8" > notary.p8
          xcrun notarytool submit gbmicros-installer.pkg \
            --key-id "$KEY_ID" \
            --issuer "$ISSUER_ID" \
            --key notary.p8 \
            --wait

          # 7. Staple the notarization to the PKG
          xcrun stapler staple gbmicros-installer.pkg

      - name: Upload Finished Client
        uses: actions/upload-artifact@v4
        with:
          name: gbmicros-macOS-Signed-Installer
          path: gbmicros-installer.pkg
