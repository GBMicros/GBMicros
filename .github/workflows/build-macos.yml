name: Build and Sign Nextcloud Client
on:
  push:
    branches:
      - master   # Tell it specifically to watch the master branch
  workflow_dispatch: # This adds a "Run manually" button to the GitHub UI

jobs:
  build-macos:
    runs-on: macos-14 # Uses a modern M2/M3 Mac runner
    steps:
      - name: Checkout Code
        uses: actions/checkout@v5
        with:
          submodules: recursive

      - name: Install Dependencies
        run: |
          # Only install the essentials that are actually available
          brew install extra-cmake-modules qt@6 qtkeychain karchive libp11 librsvg
          echo "QT_PATH=$(brew --prefix qt@6)/bin" >> $GITHUB_ENV

      - name: Import Certificates
        env:
          APP_P12: ${{ secrets.MACOS_APP_P12 }}
          INST_P12: ${{ secrets.MACOS_INSTALLER_P12 }}
          P12_PWD: ${{ secrets.P12_PASSWORD }}
        run: |
          # Create a temporary keychain
          KEYCHAIN_PATH=$RUNNER_TEMP/app-signing.keychain-db
          security create-keychain -p "" $KEYCHAIN_PATH
          security set-keychain-settings -lut 21600 $KEYCHAIN_PATH
          security unlock-keychain -p "" $KEYCHAIN_PATH

          # Import App Cert
          echo -n "$APP_P12" | base64 --decode > cert_app.p12
          security import cert_app.p12 -k $KEYCHAIN_PATH -P "$P12_PWD" -T /usr/bin/codesign
          
          # Import Installer Cert
          echo -n "$INST_P12" | base64 --decode > cert_inst.p12
          security import cert_inst.p12 -k $KEYCHAIN_PATH -P "$P12_PWD" -T /usr/bin/productsign

      - name: Compile Nextcloud Client
        run: |
          # Brute force: Comment out ALL mandatory KDE/KF6/SingleApp checks that are blocking the build
          sed -i '' 's/find_package(KDSingleApplication-qt6 REQUIRED)/# find_package(KDSingleApplication-qt6)/g' CMakeLists.txt
          sed -i '' 's/find_package(KF6GuiAddons REQUIRED)/# find_package(KF6GuiAddons)/g' CMakeLists.txt
          sed -i '' 's/find_package(KF6Config REQUIRED)/# find_package(KF6Config)/g' CMakeLists.txt
          sed -i '' 's/find_package(KF6CoreAddons REQUIRED)/# find_package(KF6CoreAddons)/g' CMakeLists.txt
          sed -i '' 's/find_package(KF6I18n REQUIRED)/# find_package(KF6I18n)/g' CMakeLists.txt
          
          rm -rf build && mkdir build && cd build
          cmake .. \
            -DCMAKE_PREFIX_PATH="$(brew --prefix qt@6);$(brew --prefix extra-cmake-modules)" \
            -DCMAKE_BUILD_TYPE=Release \
            -DWITH_SINGLE_APPLICATION=OFF \
            -DBUILD_TESTING=OFF \
            -DSVG_CONVERTER=$(brew --prefix qt@6)/share/qt/libexec/rcc # Use Qt's Resource Compiler
          make -j$(sysctl -n hw.ncpu)
          make install


      - name: Code Sign and Notarize
        env:
          KEY_ID: ${{ secrets.NOTARY_KEY_ID }}
          ISSUER_ID: ${{ secrets.NOTARY_ISSUER_ID }}
        run: |
          # 1. Sign the .app bundle
          codesign --deep --force --options runtime --sign "Developer ID Application: Gary Wayne Bentley" build/bin/Nextcloud.app
          
          # 2. Package into a .pkg
          productbuild --component build/bin/Nextcloud.app /Applications --sign "Developer ID Installer: Gary Wayne Bentley" Nextcloud-Custom.pkg
          
          # 3. Notarize with Apple
          echo "${{ secrets.NOTARY_P8 }}" | base64 --decode > notary.p8
          xcrun notarytool submit Nextcloud-Custom.pkg --key-id "$KEY_ID" --issuer "$ISSUER_ID" --key notary.p8 --wait
          
          # 4. Staple the ticket so it works offline
          xcrun stapler staple Nextcloud-Custom.pkg

      - name: Upload Finished Client
        uses: actions/upload-artifact@v5
        with:
          name: Nextcloud-macOS-Signed
          path: Nextcloud-Custom.pkg